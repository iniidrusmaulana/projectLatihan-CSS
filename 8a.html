<!DOCTYPE html>
<html>
<head>
    <title>Lesson 8</title>
</head>

<body style="font-family: Arial; padding: 20px;">

    <h2>Lesson 8 Exercises - Display</h2>

    <input type="text" placeholder="Name"
           style="display: block; margin-bottom: 10px; width: 200px;">
    <input type="email" placeholder="Email"
           style="display: block; width: 200px;">

    <hr/>

    <div>
        <p style="display: inline-block; width: 300px; vertical-align: middle;">
            Thanks for chatting with our customer support.
            Would you like to take our quick survey?
        </p>

        <button style="display: inline-block; vertical-align: middle;">
            Yes
        </button>

        <button style="display: inline-block; vertical-align: middle;">
            No
        </button>
    </div>

    <hr/>

    <div style="text-align: center; margin-top: 30px;">
        <img src="../../../../google.jpeg"
             width="200px"
             style="display: block; margin: auto;">

        <input type="text"
               placeholder="Search Google or type a URL"
               style="width: 400px; padding: 10px;
                      border-radius: 20px; border: 1px solid #ccc;">
    </div>

    <hr/>

    <h2>Challenge Exercises</h2>

    <div style="width: 300px; border: 1px solid #ccc;
                padding: 15px; border-radius: 8px;">

        <input type="text" placeholder="First name"
               style="display: inline-block; width: 140px; margin-bottom: 10px;">

        <input type="text" placeholder="Last name"
               style="display: inline-block; width: 140px; margin-bottom: 10px;">

        <input type="email" placeholder="Email"
               style="display: block; width: 290px; margin-bottom: 10px;">

        <button style="width: 100%; padding: 10px;
                       background: #3b82f6; color: white;
                       border: none; border-radius: 6px;">
            Sign Up
        </button>
    </div>

    <hr/>

    <div style="width: 300px; border: 1px solid #ccc;
                padding: 15px;">

        <h3>Request a ride now</h3>

        <input type="text" placeholder="Enter pickup location"
               style="display: block; width: 100%;
                      margin-bottom: 10px; padding: 8px;">

        <input type="text" placeholder="Enter destination"
               style="display: block; width: 100%;
                      margin-bottom: 10px; padding: 8px;">

        <button style="padding: 8px 12px;
                       background: black; color: white;
                       border: none;">
            Request now
        </button>

        <button style="padding: 8px 12px;
                       background: #e5e5e5;
                       border: none;">
            Schedule for later
        </button>
    </div>

</body>
</html>
