<!DOCTYPE html>
<html>
<head>
  <title>Lesson 3</title>
    <u>lesson 3 exercises - Hovers, transitions, shadows</u>
    <br><br>
  <style>
    body{
      font-family: Arial;
    }

    .btn1{
      background:black;
      color:white;
      border:none;
      padding:10px 20px;
    }

    .btn1:hover{
      opacity:0.8;
    }

    .btn2{
      background:rgb(255,216,20);
      border:none;
      padding:10px 25px;
      border-radius:20px;
    }

    .btn2:hover{
      background:rgb(245,205,3);
    }

    .btn3{
      background:rgb(46,164,79);
      color:white;
      border:none;
      padding:10px 20px;
      border-radius:5px;
      font-weight:bold;
    }

    .btn3:hover{
      box-shadow:0 5px 8px rgba(0,0,0,0.3);
    }

    .btn4{
      background:rgb(121,82,179);
      color:white;
      border:none;
      padding:10px 20px;
    }

    .btn4:hover{
      background:rgb(100,70,150);
    }

    .btn5{
      background:gray;
      color:white;
      border:none;
      padding:10px 20px;
    }

    .btn5:hover{
      opacity:0.8;
    }

    .btn6{
      background:rgb(10,102,194);
      color:white;
      border:none;
      padding:10px 25px;
      border-radius:20px;
    }

    .btn6:hover{
      background:rgb(9,90,170);
    }

    .btn7{
      background:white;
      color:rgb(10,102,194);
      border:1px solid rgb(10,102,194);
      padding:10px 20px;
      border-radius:20px;
    }

    .btn7:hover{
      border-width:2px;
    }
  </style>
</head>

<body>

<button class="btn1">Request now</button>
<br><br>

<button class="btn2">Add to Cart</button>
<br><br>

<button class="btn3">Sign up</button>
<br><br>

<button class="btn4">Get started</button>
<button class="btn5">Download</button>
<br><br>

<button class="btn6">Apply on company website</button>
<button class="btn7">Save</button>

</body>
</html>
