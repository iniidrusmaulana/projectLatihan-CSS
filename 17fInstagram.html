<!DOCTYPE html>
<html>
<head>
  <title>Instagram Clone - 1 Post Only</title>
  <link rel="stylesheet" href="17fInstagram.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <input 
  type="text" 
  id="igSearch"
  placeholder="Search Instagram" 
  class="search-bar">

<script>
  const input = document.getElementById("igSearch");

  input.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      const query = input.value.trim();
      if (query !== "") {
        window.location.href = "https://www.instagram.com/web/search/topsearch/?query=" + encodeURIComponent(query);
      }
    }
  });
</script>

  <div class="container">
    <nav class="sidebar">
      <h2 class="insta-logo">Instagram</h2>
      <div class="nav-links">
        <div class="nav-item active">
          <img src="icons/home.jpeg"> <span>Home</span>
        </div>
        <div class="nav-item">
          <img src="icons/search.jpeg"> <span>Search</span>
        </div>
        <div class="nav-item">
          <img src="reels.jpeg"> <span>Reels</span>
        </div>
        <div class="nav-item">
          <img src="icons/notif.jpeg"> <span>Notifications</span>
        </div>
        <div class="nav-item">
          <img src="pfp kosong.jpeg" class="nav-avatar"> <span>Profile</span>
        </div>
      </div>
    </nav>

    <main class="content">
      <div class="feed-container">
        
        <div class="stories-bar">
          <div class="story">
            <div class="story-circle"><img src="pfp kosong.jpeg"></div>
            <span>Your Story</span>
          </div>
          <div class="story">
            <div class="story-circle"><img src="jake.jpeg"></div>
            <span>JaaAkke</span>
          </div>
        </div>

        <div class="post">
          <div class="post-header">
            <img src="pfp kosong.jpeg" class="post-avatar">
            <strong>Darklaveno</strong> • <span>1h</span>
          </div>
          <div class="post-image-container">
            <img src="xiao.jpeg" class="post-main-img">
          </div>
          <div class="post-footer">
            <div class="icons-row">
              <img src="like.jpeg"> 
              <img src="komen.jpeg">
            </div>
            <p><strong>Darklaveno</strong>  Golden hour in a cup</p>
          </div>
        </div>

      </div>

      <aside class="suggestions">
        <div class="user-profile-side">
          <img src="pfp kosong.jpeg" class="avatar-large">
          <div>
            <strong>Darklaveno</strong>
            <p>lan</p>
          </div>
        </div>
        <div class="suggest-header">
          <span>Suggested for you</span>
          <strong>See All</strong>
        </div>
        <div class="suggest-item">
          <img src="katul senam.png">
          <div><strong>katul senam</strong> <p>Joel Membagikan Reels dari_adalahPokoknya...</p></div>
          <span class="follow-btn">Follow</span>
        </div>
      </aside>
    </main>
  </div>

</body>
</html>
