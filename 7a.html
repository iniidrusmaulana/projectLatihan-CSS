<!DOCTYPE html>
<html>
<head>
    <title>Lesson 7</title>
</head>

<body style="font-family: Arial; text-align: center;">

    <h2>Lesson 7 - Images</h2>

    <p>my wife</p>
    <img src="../../../../eunsoo.jpeg"
         width="200px"
         style="border-radius: 15px;"
         alt="image 7a">
    <hr/>

    <p>my kisah</p>
    <img src="../../../../yujin.jpeg"
         width="200px"
         height="200px"
         style="object-fit: cover; display: block; margin: auto;"
         alt="image 7b">
    <hr/>

    <p>my pacar</p>
    <img src="../../../../karina.jpeg"
         width="200px"
         height="200px"
         style="border-radius: 50%; object-fit: cover;"
         alt="image 7c">
    <hr/>

    <h2>Create a textbox</h2>

    <input type="text"
           placeholder="Search"
           style="border-radius: 8px; padding: 8px; border: 1px solid gray;">
    <hr/>

    <input type="text"
           placeholder="Search Google or type a URL"
           style="padding: 10px; border: none; border-radius: 20px;
                  box-shadow: 0 2px 5px gray; width: 300px;">
    <hr/>

    <h2>Challenge</h2>

    <div style="display: flex; align-items: center; width: 400px;
                border: 1px solid #ccc; padding: 10px;
                border-radius: 30px; margin: auto;">

        <img src="../../../../goyounjung.jpeg"
             width="40px"
             height="40px"
             style="border-radius: 50%;">

        <input type="text"
               placeholder="What's happening?"
               style="border: none; margin: 0 10px; flex: 1;">

        <button style="background: #1da1f2; color: white; border: none;
                       border-radius: 20px; padding: 6px 12px;">
            Tweet
        </button>
    </div>

</body>
</html>
